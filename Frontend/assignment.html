<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>
</head>
<body>

<h1>Mark Attendance</h1>

method="post">

name="student_id"

name="date">

<br><br>

<select name="status">

<option>
Present
</option>

<option>

</option>

</select>

<br><br>

<button>
Submit
</button>

</form>

</body>
</html>
