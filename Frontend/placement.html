<!DOCTYPE html>
<html>
<head>
<title>Create Drive</title>
</head>
<body>

<h1>Create Placement Drive</h1>

<form action="/drive/create"
method="post">

<input type="text"
name="company_name"
placeholder="Company">

<br><br>

<input type="text"
name="role"
placeholder="Role">

<br><br>

<input type="number"
step="0.01"
name="package"
placeholder="Package">

<br><br>

<input type="date"
name="drive_date">

<br><br>

<input type="number"
step="0.01"
name="eligibility_cgpa"
placeholder="Eligibility CGPA">

<br><br>

<button>
Create Drive
</button>

</form>

</body>
</html>
