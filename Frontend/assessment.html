<!DOCTYPE html>
<html>
<head>
<title>Create Assessment</title>
</head>
<body>

<h1>Create Assessment</h1>

<form action="/assessment/create"
method="post">

<input type="text"
name="title"
placeholder="Title">

<br><br>

<input type="text"
name="subject"
placeholder="Subject">

<br><br>

<input type="number"
name="total_marks">

<br><br>

<input type="number"
name="obtained_marks">

<br><br>

<input type="number"
name="student_id"
placeholder="Student ID">

<br><br>

<button>
Create
</button>

</form>

</body>
</html>
