<!DOCTYPE html>
<html>
<head>
    <title>Assessments</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            padding:40px;
        }

        .container{
            width:500px;
            margin:auto;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            color:#cbd5e1;
            margin-bottom:8px;
        }

        input{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#334155;
            color:white;
            outline:none;
            font-size:15px;
        }

        input::placeholder{
            color:#94a3b8;
        }

        .btn-create{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#3b82f6;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn-create:hover{
            background:#2563eb;
        }

        .assessment-table{
            width:100%;
            margin-top:50px;
            border-collapse:collapse;
        }

        .assessment-table th{
            background:#3b82f6;
            padding:15px;
        }

        .assessment-table td{
            background:#1e293b;
            padding:15px;
            border-bottom:1px solid #334155;
        }

        .assessment-table input{
            padding:10px;
        }

        .update-btn{
            background:#22c55e;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:8px;
            cursor:pointer;
        }

        .update-btn:hover{
            background:#16a34a;
        }

        .delete-btn{
            background:#dc2626;
            color:white;
            padding:10px 15px;
            border-radius:8px;
            text-decoration:none;
            margin-left:10px;
        }

        .delete-btn:hover{
            background:#b91c1c;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Create Assessment</h1>

    <form action="/assessment/create" method="post">

        <div class="form-group">
            <label>Assessment Title</label>
            <input
                type="text"
                name="title"
                placeholder="Enter assessment title"
                required>
        </div>

        <div class="form-group">
            <label>Subject</label>
            <input
                type="text"
                name="subject"
                placeholder="Enter subject"
                required>
        </div>

        <div class="form-group">
            <label>Total Marks</label>
            <input
                type="number"
                name="total_marks"
                placeholder="100"
                required>
        </div>

        <div class="form-group">
            <label>Obtained Marks</label>
            <input
                type="number"
                name="obtained_marks"
                placeholder="85"
                required>
        </div>

        <div class="form-group">
            <label>Submission Date</label>
            <input
                type="date"
                name="date"
                required>
        </div>

        <button type="submit" class="btn-create">
            Create Assessment
        </button>

    </form>

</div>

</body>
</html>
