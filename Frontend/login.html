```html
<!DOCTYPE html>
<html>
<head>
    <title>Student Placement System - Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#0f172a;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:400px;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
        }

        h1{
            color:white;
            text-align:center;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            color:#cbd5e1;
            margin-bottom:8px;
        }

        input{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#334155;
            color:white;
            outline:none;
        }

        input::placeholder{
            color:#94a3b8;
        }

        .btn-login{
            width:100%;
            padding:15px;
            background:#3b82f6;
            color:white;
            border:none;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#2563eb;
        }

        .error{
            background:#7f1d1d;
            color:white;
            padding:15px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .footer-text{
            text-align:center;
            margin-top:20px;
            color:#94a3b8;
        }

        .footer-text a{
            color:#60a5fa;
            text-decoration:none;
        }

        .footer-text a:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Login</h1>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form action="/login" method="post">

        <div class="form-group">
            <label>Email Address</label>
            <input type="email"
                   name="email"
                   placeholder="email@example.com"
                   required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password"
                   name="password"
                   placeholder="••••••••"
                   required>
        </div>

        <button type="submit" class="btn-login">
            Sign In
        </button>

    </form>

    <div class="footer-text">
        Don't have an account?
        <a href="/signup">Create one</a>
    </div>

</div>

</body>
</html>
```
